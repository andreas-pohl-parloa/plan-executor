name: Execute Plan

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

# Allow-lists for plan-driven Claude marketplace / plugin installation.
#
# The "Install Claude marketplaces and plugins" step parses
# `**add-marketplaces:**` / `**add-plugins:**` header lines from the plan
# and feeds them to `claude plugin marketplace add` / `claude plugin install`.
# Without an allow-list a malicious plan could install arbitrary plugins
# that then run with full repo secrets (Sec F-6).
#
# Operators add new marketplaces/plugins by editing this workflow file
# (PR-reviewed) and appending the new slug to the corresponding env var
# below. Any value not present here causes the install step to fail
# closed before the plugin/marketplace is fetched.
env:
  ALLOWED_MARKETPLACES: "andreas-pohl-parloa/plan-executor-plugin andreas-pohl-parloa/plan-executor-marketplace andreas-pohl-parloa/security-marketplace andreas-pohl-parloa/my-coding-marketplace"
  ALLOWED_PLUGINS: "plan-executor@plan-executor security@security-marketplace my-coding@my-coding-marketplace"

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: startsWith(github.head_ref, 'exec/')

    steps:
      - name: Checkout execution repo
        uses: actions/checkout@v4

      - name: Detect job kind
        id: kind
        run: |
          # Dispatch on job-spec.json `kind`. Missing file → fall back to
          # `plan` for backward compatibility (pre-job-framework PRs) and
          # emit a deprecation warning. Unknown kind → fail loudly.
          if [ ! -f job-spec.json ]; then
            echo "::warning::job-spec.json not found at PR branch root; falling back to plan execution. This fallback is deprecated — regenerate the execution PR with the current plan-executor handover skill."
            echo "kind=plan" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KIND=$(jq -r '.kind // empty' job-spec.json)
          if [ -z "$KIND" ]; then
            echo "::error::job-spec.json missing required 'kind' field"
            exit 1
          fi

          case "$KIND" in
            plan|pr-finalize)
              echo "kind=${KIND}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown job-spec.json kind: ${KIND} (expected: plan, pr-finalize)"
              exit 1
              ;;
          esac

      - name: Parse and validate execution metadata
        id: meta
        if: steps.kind.outputs.kind == 'plan'
        run: |
          TARGET_REPO=$(jq -r '.target_repo' execution.json)
          TARGET_REF=$(jq -r '.target_ref' execution.json)
          TARGET_BRANCH=$(jq -r '.target_branch' execution.json)
          PLAN_FILENAME=$(jq -r '.plan_filename' execution.json)

          # Validate repo slug format (owner/repo)
          if ! echo "$TARGET_REPO" | grep -qP '^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid target_repo: $TARGET_REPO"
            exit 1
          fi
          # Validate target_ref is a 40-char hex SHA
          if ! echo "$TARGET_REF" | grep -qP '^[0-9a-f]{40}$'; then
            echo "::error::Invalid target_ref (must be full SHA): $TARGET_REF"
            exit 1
          fi
          # Validate branch name (no shell metacharacters)
          if ! echo "$TARGET_BRANCH" | grep -qP '^[a-zA-Z0-9._/-]+$'; then
            echo "::error::Invalid target_branch: $TARGET_BRANCH"
            exit 1
          fi
          # Validate plan filename (no path traversal or directory separators)
          if echo "$PLAN_FILENAME" | grep -qP '\.\.|/' || ! echo "$PLAN_FILENAME" | grep -qP '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid plan_filename: $PLAN_FILENAME"
            exit 1
          fi

          echo "target_repo=${TARGET_REPO}" >> "$GITHUB_OUTPUT"
          echo "target_ref=${TARGET_REF}" >> "$GITHUB_OUTPUT"
          echo "target_branch=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "plan_filename=${PLAN_FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Parse and validate pr-finalize metadata
        id: meta_pr_finalize
        if: steps.kind.outputs.kind == 'pr-finalize'
        run: |
          # job-spec.json fields for pr-finalize:
          #   pr           (required, integer PR number)
          #   merge        (optional, bool — fast-forward merge after fixes)
          #   merge_admin  (optional, bool — admin merge after fixes)
          #   owner        (optional, string — defaults to current repo owner)
          #   repo         (optional, string — defaults to current repo name)
          PR=$(jq -r '.pr // empty' job-spec.json)
          MERGE=$(jq -r '.merge // false' job-spec.json)
          MERGE_ADMIN=$(jq -r '.merge_admin // false' job-spec.json)
          OWNER=$(jq -r '.owner // empty' job-spec.json)
          REPO=$(jq -r '.repo // empty' job-spec.json)

          if [ -z "$PR" ] || ! echo "$PR" | grep -qP '^[0-9]+$'; then
            echo "::error::pr-finalize job-spec.json: 'pr' must be a positive integer (got: '${PR}')"
            exit 1
          fi
          if [ "$MERGE" = "true" ] && [ "$MERGE_ADMIN" = "true" ]; then
            echo "::error::pr-finalize job-spec.json: 'merge' and 'merge_admin' are mutually exclusive"
            exit 1
          fi
          if [ -n "$OWNER" ] && ! echo "$OWNER" | grep -qP '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid owner: $OWNER"
            exit 1
          fi
          if [ -n "$REPO" ] && ! echo "$REPO" | grep -qP '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid repo: $REPO"
            exit 1
          fi
          if { [ -n "$OWNER" ] && [ -z "$REPO" ]; } || { [ -z "$OWNER" ] && [ -n "$REPO" ]; }; then
            echo "::error::pr-finalize job-spec.json: 'owner' and 'repo' must be set together"
            exit 1
          fi

          echo "pr=${PR}" >> "$GITHUB_OUTPUT"
          echo "merge=${MERGE}" >> "$GITHUB_OUTPUT"
          echo "merge_admin=${MERGE_ADMIN}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

      - name: Clone target repo
        if: steps.kind.outputs.kind == 'plan'
        env:
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
          TARGET_REF: ${{ steps.meta.outputs.target_ref }}
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TARGET_REPO_TOKEN}@github.com/${TARGET_REPO}.git" workspace
          cd workspace
          git checkout "$TARGET_REF"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Configure commit signing
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
        run: |
          # Graceful no-op when signing isn't configured yet — commits in
          # older execution repos keep going out unsigned until their
          # operator runs `plan-executor remote-setup` again.
          if [ -z "$GPG_SIGNING_KEY_ID" ] || [ -z "$GPG_SIGNING_KEY" ]; then
            echo "No GPG_SIGNING_KEY configured; commits will be unsigned."
            exit 0
          fi

          # Import the private key, trust it ultimately so gpg doesn't
          # complain, and pick up the uid for git author identity.
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          echo "${GPG_SIGNING_KEY_ID}:6:" | gpg --import-ownertrust

          UID_LINE=$(gpg --with-colons --list-secret-keys "$GPG_SIGNING_KEY_ID" \
            | awk -F: '/^uid:/ { print $10; exit }')
          # Strip the (comment) segment (the `plan-executor CI` marker
          # lives there) and the <email> segment to recover Name-Real.
          NAME=$(printf '%s' "$UID_LINE" \
            | sed -e 's/ *([^)]*)//g' -e 's/ *<[^>]*>$//' \
            | sed 's/  */ /g' \
            | sed 's/^ *//; s/ *$//')
          EMAIL=$(printf '%s' "$UID_LINE" | sed -n 's/.*<\([^>]*\)>.*/\1/p')

          git config --global user.signingkey "$GPG_SIGNING_KEY_ID"
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          echo "Commit signing configured: $GPG_SIGNING_KEY_ID ($NAME <$EMAIL>)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli || true

      - name: Install plan-executor and sjv binaries
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # Sec F-14: every release zip MUST be accompanied by a sibling
          # `<asset>.sha256` release asset (produced by `gh release upload`
          # alongside the zip). The workflow downloads both, recomputes the
          # SHA256, and fails closed on mismatch or missing checksum file.
          # Older releases without the sidecar must be re-uploaded with a
          # `.sha256` companion or the operator must pin to a newer tag.
          for repo_asset in "plan-executor:plan-executor-linux-x86_64.zip" "stream-json-view:sjv-linux-x86_64.zip"; do
            REPO="andreas-pohl-parloa/${repo_asset%%:*}"
            ASSET="${repo_asset##*:}"
            BINARY="${ASSET%%-linux*}"
            TAG=$(gh api "repos/$REPO/releases" \
              --jq "[.[] | select(.assets | map(.name) | any(contains(\"linux\")))][0].tag_name")
            echo "Downloading $BINARY $TAG from $REPO"
            gh release download "$TAG" --repo "$REPO" --pattern "$ASSET" --dir /tmp
            # Fail closed if the .sha256 sidecar is missing — never skip
            # verification silently.
            if ! gh release download "$TAG" --repo "$REPO" --pattern "${ASSET}.sha256" --dir /tmp; then
              echo "::error::missing checksum file ${ASSET}.sha256 in release $TAG of $REPO. Upload it with 'gh release upload $TAG ${ASSET}.sha256 --repo $REPO' or pin to a newer release that ships the checksum."
              exit 1
            fi
            EXPECTED_SHA=$(awk '{print $1}' "/tmp/${ASSET}.sha256")
            ACTUAL_SHA=$(sha256sum "/tmp/$ASSET" | awk '{print $1}')
            if [ -z "$EXPECTED_SHA" ]; then
              echo "::error::could not parse expected checksum from /tmp/${ASSET}.sha256"
              exit 1
            fi
            if [ "$EXPECTED_SHA" != "$ACTUAL_SHA" ]; then
              echo "::error::checksum mismatch for ${ASSET}: expected $EXPECTED_SHA got $ACTUAL_SHA"
              exit 1
            fi
            echo "Checksum OK for ${ASSET}: $ACTUAL_SHA"
            unzip -qo "/tmp/$ASSET" -d /tmp
          done
          chmod +x /tmp/plan-executor /tmp/sjv
          sudo mv /tmp/plan-executor /tmp/sjv /usr/local/bin/

      - name: Install Claude marketplaces and plugins
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          PLAN_FILENAME: ${{ steps.meta.outputs.plan_filename }}
          JOB_KIND: ${{ steps.kind.outputs.kind }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

          # Always install the base marketplace and plugin (needed by both
          # `kind: plan` execution and `kind: pr-finalize` — the pr-finalize
          # skill ships in plan-executor@plan-executor).
          echo "Adding marketplace: andreas-pohl-parloa/plan-executor-plugin"
          claude plugin marketplace add andreas-pohl-parloa/plan-executor-plugin || true
          echo "Installing plugin: plan-executor@plan-executor"
          claude plugin install plan-executor@plan-executor || true

          # Plan-driven extra marketplaces/plugins are only relevant for
          # `kind: plan`; pr-finalize jobs ship no plan.md.
          if [ "$JOB_KIND" != "plan" ]; then
            echo "Skipping plan-driven marketplace/plugin extensions (kind=${JOB_KIND})."
            exit 0
          fi

          PLAN_FILE="plan.md"

          # Install additional marketplaces from **add-marketplaces:** header.
          # Each entry MUST appear in $ALLOWED_MARKETPLACES (workflow env at
          # top of file) — see Sec F-6. Unknown values fail the build.
          MARKETPLACES=$(grep -i '^\*\*add-marketplaces:\*\*' "$PLAN_FILE" | sed 's/.*\*\*[[:space:]]*//' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          for mp in $MARKETPLACES; do
            [ -z "$mp" ] && continue
            [[ "$mp" == "andreas-pohl-parloa/plan-executor-plugin" ]] && continue
            case " $ALLOWED_MARKETPLACES " in
              *" $mp "*)
                ;;
              *)
                echo "::error::marketplace $mp not in allow-list (ALLOWED_MARKETPLACES). To permit it, edit docs/remote-execution/execute-plan.yml and add the slug to env.ALLOWED_MARKETPLACES."
                exit 1
                ;;
            esac
            echo "Adding marketplace: $mp"
            claude plugin marketplace add "$mp" || true
          done

          # Install additional plugins from **add-plugins:** header.
          # Each entry MUST appear in $ALLOWED_PLUGINS (workflow env at top
          # of file) — see Sec F-6. Unknown values fail the build.
          PLUGINS=$(grep -i '^\*\*add-plugins:\*\*' "$PLAN_FILE" | sed 's/.*\*\*[[:space:]]*//' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          for pl in $PLUGINS; do
            [ -z "$pl" ] && continue
            [[ "$pl" == "plan-executor@plan-executor" ]] && continue
            case " $ALLOWED_PLUGINS " in
              *" $pl "*)
                ;;
              *)
                echo "::error::plugin $pl not in allow-list (ALLOWED_PLUGINS). To permit it, edit docs/remote-execution/execute-plan.yml and add the slug to env.ALLOWED_PLUGINS."
                exit 1
                ;;
            esac
            echo "Installing plugin: $pl"
            claude plugin install "$pl" || true
          done

      - name: Restore agent auth
        run: |
          if [ -n "$CODEX_AUTH" ]; then
            mkdir -p ~/.codex
            printenv CODEX_AUTH > ~/.codex/auth.json
            chmod 600 ~/.codex/auth.json
          fi
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}

      - name: Copy plan into target repo
        if: steps.kind.outputs.kind == 'plan'
        env:
          PLAN_FILENAME: ${{ steps.meta.outputs.plan_filename }}
        run: |
          PLAN_DIR="workspace/.my/plans"
          mkdir -p "$PLAN_DIR"
          cp plan.md "$PLAN_DIR/$PLAN_FILENAME"
          if [ -d prompt-files ]; then
            cp prompt-files/* "$PLAN_DIR/" 2>/dev/null || true
          fi
          # Manifest-only execution: copy tasks.json into workspace next to the plan,
          # then rewrite manifest.plan.path to the in-workspace plan location so the
          # remote runner's read_manifest_plan_block resolves it correctly.
          MANIFEST_DIR="workspace/.tmp-plan-compiled"
          mkdir -p "$MANIFEST_DIR"
          cp tasks.json "$MANIFEST_DIR/tasks.json"
          NEW_PLAN_PATH="$(pwd)/$PLAN_DIR/$PLAN_FILENAME"
          jq --arg p "$NEW_PLAN_PATH" '.plan.path = $p' "$MANIFEST_DIR/tasks.json" > "$MANIFEST_DIR/tasks.json.tmp"
          mv "$MANIFEST_DIR/tasks.json.tmp" "$MANIFEST_DIR/tasks.json"

      - name: Execute plan
        id: execute
        if: steps.kind.outputs.kind == 'plan'
        env:
          PLAN_FILENAME: ${{ steps.meta.outputs.plan_filename }}
          PLAN_EXECUTOR_LOCAL: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          cd workspace
          plan-executor execute -f .tmp-plan-compiled/tasks.json

      - name: Run pr-finalize
        id: pr_finalize
        if: steps.kind.outputs.kind == 'pr-finalize'
        env:
          PLAN_EXECUTOR_LOCAL: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          PR: ${{ steps.meta_pr_finalize.outputs.pr }}
          MERGE: ${{ steps.meta_pr_finalize.outputs.merge }}
          MERGE_ADMIN: ${{ steps.meta_pr_finalize.outputs.merge_admin }}
          OWNER: ${{ steps.meta_pr_finalize.outputs.owner }}
          REPO: ${{ steps.meta_pr_finalize.outputs.repo }}
        run: |
          # Build argv as an array so optional flags are passed correctly.
          ARGS=(run pr-finalize --pr "$PR")
          if [ "$MERGE" = "true" ]; then
            ARGS+=(--merge)
          fi
          if [ "$MERGE_ADMIN" = "true" ]; then
            ARGS+=(--merge-admin)
          fi
          if [ -n "$OWNER" ] && [ -n "$REPO" ]; then
            ARGS+=(--owner "$OWNER" --repo "$REPO")
          fi
          echo "Invoking: plan-executor ${ARGS[*]}"
          plan-executor "${ARGS[@]}"

      - name: Post result comment
        if: always()
        env:
          JOB_KIND: ${{ steps.kind.outputs.kind }}
          EXECUTE_OUTCOME: ${{ steps.execute.outcome }}
          PR_FINALIZE_OUTCOME: ${{ steps.pr_finalize.outcome }}
          TARGET_REPO: ${{ steps.meta.outputs.target_repo }}
          TARGET_REF: ${{ steps.meta.outputs.target_ref }}
          TARGET_BRANCH: ${{ steps.meta.outputs.target_branch }}
          PLAN_FILENAME: ${{ steps.meta.outputs.plan_filename }}
          PR_FINALIZE_PR: ${{ steps.meta_pr_finalize.outputs.pr }}
          PR_FINALIZE_OWNER: ${{ steps.meta_pr_finalize.outputs.owner }}
          PR_FINALIZE_REPO: ${{ steps.meta_pr_finalize.outputs.repo }}
          PR_FINALIZE_MERGE: ${{ steps.meta_pr_finalize.outputs.merge }}
          PR_FINALIZE_MERGE_ADMIN: ${{ steps.meta_pr_finalize.outputs.merge_admin }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "$JOB_KIND" = "pr-finalize" ]; then
            OUTCOME="$PR_FINALIZE_OUTCOME"
          else
            OUTCOME="$EXECUTE_OUTCOME"
          fi
          if [ "$OUTCOME" = "success" ]; then
            STATUS="succeeded"
          else
            STATUS="failed"
          fi

          # Read execution summary written by the skill. Scope find to the
          # canonical execution directory (workspace/) to avoid picking up
          # attacker-placed files elsewhere in the runner home.
          # workspace/ is only created when the plan path runs `Clone target
          # repo`; pr-finalize jobs skip that step, so guard the find to
          # avoid bash -e killing the script on missing-directory.
          SUMMARY=""
          if [ -d workspace ]; then
            SUMMARY_FILE=$(find workspace -maxdepth 3 -name .tmp-execution-summary.md -not -path '*/.git/*' -print -quit 2>/dev/null)
            if [ -n "$SUMMARY_FILE" ]; then
              SUMMARY=$(head -c 60000 "$SUMMARY_FILE")
            fi
          fi

          if [ "$JOB_KIND" = "pr-finalize" ]; then
            # Resolve owner/repo into intermediate vars first — nested
            # ${VAR:-${GH_REPO%/*}} does not recursively evaluate suffix
            # removal inside the default expansion in all bash versions.
            OWNER_RES="${PR_FINALIZE_OWNER:-${GH_REPO%/*}}"
            REPO_RES="${PR_FINALIZE_REPO:-${GH_REPO#*/}}"
            TARGET_DESC="${OWNER_RES}/${REPO_RES}#${PR_FINALIZE_PR}"
            MERGE_DESC="no"
            if [ "$PR_FINALIZE_MERGE" = "true" ]; then
              MERGE_DESC="merge"
            elif [ "$PR_FINALIZE_MERGE_ADMIN" = "true" ]; then
              MERGE_DESC="merge-admin"
            fi
            BODY="## PR Finalize Complete

          **Status:** ${STATUS}
          **Target PR:** ${TARGET_DESC}
          **Merge:** ${MERGE_DESC}"
          else
            REF_SHORT="${TARGET_REF:0:12}"
            BODY="## Execution Complete

          **Status:** ${STATUS}
          **Target:** ${TARGET_REPO}@${REF_SHORT}
          **Branch:** ${TARGET_BRANCH}
          **Plan:** ${PLAN_FILENAME}"
          fi

          if [ -n "$SUMMARY" ]; then
            BODY="${BODY}

          ---

          ${SUMMARY}"
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --body "$BODY"

          gh pr close "$PR_NUMBER" \
            --repo "$GH_REPO" || true
          gh label create "${STATUS}" --repo "$GH_REPO" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" \
            --repo "$GH_REPO" \
            --add-label "${STATUS}" || true

      - name: Cleanup credentials
        if: always()
        run: rm -f ~/.codex/auth.json
